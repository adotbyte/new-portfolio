name: Deploy to Raspberry Pi

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env
        env:
          RS_GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          RS_TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          RS_NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          RS_ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          RS_ZOHO_PASSWORD: ${{ secrets.ZOHO_PASSWORD }}
          RS_CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          RS_FB_APP_ID: ${{ secrets.FB_APP_ID }}
          RS_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RS_GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RS_DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          RS_ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
        run: |
          cd ${{ github.workspace }}
          echo "GEMINI_API_KEY=$RS_GEMINI_KEY" > .env
          echo "TURNSTILE_SECRET_KEY=$RS_TURNSTILE_SECRET_KEY" >> .env
          echo "NEXT_PUBLIC_TURNSTILE_SITE_KEY=$RS_NEXT_PUBLIC_TURNSTILE_SITE_KEY" >> .env
          echo "ZOHO_EMAIL=$RS_ZOHO_EMAIL" >> .env
          echo "ZOHO_PASSWORD=$RS_ZOHO_PASSWORD" >> .env
          echo "CONTACT_EMAIL=$RS_CONTACT_EMAIL" >> .env
          echo "FB_APP_ID=$RS_FB_APP_ID" >> .env
          echo "ANTHROPIC_API_KEY=$RS_ANTHROPIC_API_KEY" >> .env
          echo "GH_TOKEN=$RS_GH_TOKEN" >> .env
          echo "DATABASE_URL=postgresql://portfolio:$RS_DB_PASSWORD@db:5432/portfolio" >> .env
          echo "DB_PASSWORD=$RS_DB_PASSWORD" >> .env
          echo "ANTHROPIC_MODEL=$RS_ANTHROPIC_MODEL" >> .env
          echo "✅ .env created successfully"

      - name: Build and Restart
        run: |
          git pull origin main

          docker compose build --no-cache \
            --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY="${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}"

          docker compose up -d --force-recreate

          docker image prune -f

          echo "✅ Container started"

      - name: Run Migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd ${{ github.workspace }}/frontend
          npm ci --omit=dev
          /usr/bin/npx prisma migrate deploy
          echo "✅ Migrations applied"

      - name: Verify Deployment
        run: |
          echo "Waiting for container to be healthy..."
          for i in $(seq 1 12); do
            STATUS=$(docker inspect --format='{{json .State.Health.Status}}' resume_website)
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "\"healthy\"" ]; then
              echo "✅ Website is UP and Healthy!"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Website failed to become healthy"
          docker logs resume_website --tail 50
          exit 1