name: Deploy to Raspberry Pi

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env
        env:
          RS_GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          RS_TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          RS_NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          RS_ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          RS_ZOHO_PASSWORD: ${{ secrets.ZOHO_PASSWORD }}
          RS_CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          RS_FB_APP_ID: ${{ secrets.FB_APP_ID }}
        run: |
          cd ${{ github.workspace }}

          cat > .env << ENVEOF
          GEMINI_API_KEY="$RS_GEMINI_KEY"
          TURNSTILE_SECRET_KEY="$RS_TURNSTILE_SECRET_KEY"
          NEXT_PUBLIC_TURNSTILE_SITE_KEY="$RS_NEXT_PUBLIC_TURNSTILE_SITE_KEY"
          ZOHO_EMAIL="$RS_ZOHO_EMAIL"
          ZOHO_PASSWORD="$RS_ZOHO_PASSWORD"
          CONTACT_EMAIL="$RS_CONTACT_EMAIL"
          NEXT_PUBLIC_FB_APP_ID="$RS_FB_APP_ID"
          ENVEOF

          echo "✅ .env created successfully"

      - name: Build and Restart
        run: |
          git pull origin main

          docker compose build --no-cache \
            --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY="${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}"

          docker compose up -d --force-recreate

          docker image prune -f

          echo "✅ Container started"

      - name: Verify Deployment
        run: |
          echo "Waiting for container to be healthy..."
          for i in $(seq 1 12); do
            STATUS=$(docker inspect --format='{{json .State.Health.Status}}' resume_website)
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "\"healthy\"" ]; then
              echo "✅ Website is UP and Healthy!"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Website failed to become healthy"
          docker logs resume_website --tail 50
          exit 1