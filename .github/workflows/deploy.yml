name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env and Restart
        # We define the env vars directly in the step for maximum reliability
        env:
          RS_SECRET_KEY: ${{ secrets.SECRET_KEY }}
          RS_EMAIL_USER: ${{ secrets.EMAIL_HOST_USER }}
          RS_EMAIL_PASS: ${{ secrets.EMAIL_HOST_PASSWORD }}
          RS_NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          RS_EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          RS_EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          RS_EMAIL_TLS: ${{ secrets.EMAIL_USE_TLS }}
          RS_GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          RS_DEBUG: ${{ secrets.DEBUG }}
          RS_ALLOWED: ${{ secrets.ALLOWED_HOSTS }}
        run: |
          # 1. Navigate to the folder where your docker-compose.yml lives
          cd $GITHUB_WORKSPACE

          # 2. Write EVERY variable to the .env file
          echo "SECRET_KEY=$RS_SECRET_KEY" > .env
          echo "EMAIL_HOST_USER=$RS_EMAIL_USER" >> .env
          echo "EMAIL_HOST_PASSWORD=$RS_EMAIL_PASS" >> .env
          echo "NOTIFY_EMAIL=$RS_NOTIFY_EMAIL" >> .env
          echo "EMAIL_HOST=$RS_EMAIL_HOST" >> .env
          echo "EMAIL_PORT=${RS_EMAIL_PORT:-587}" >> .env
          echo "EMAIL_USE_TLS=$RS_EMAIL_TLS" >> .env
          echo "GEMINI_API_KEY=$RS_GEMINI_KEY" >> .env
          echo "DEBUG=$RS_DEBUG" >> .env
          echo "ALLOWED_HOSTS=$RS_ALLOWED" >> .env

          # 3. Deploy
          docker compose pull
          docker compose up -d --force-recreate
          
          # 4. Cleanup (Lazy way to keep your Raspberry Pi clean)
          docker image prune -f