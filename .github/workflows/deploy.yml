name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      # No need to "checkout" if you have the files manually on the server, 
      # BUT if you want it automated, do this:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env and Restart
        working-directory: ${{ github.workspace }} # Ensures we are in the right folder
        run: |
          # Create the .env file
          cat <<EOF > .env
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}
          NOTIFY_EMAIL=${{ secrets.NOTIFY_EMAIL }}
          EMAIL_HOST=${{ secrets.EMAIL_HOST }}
          EMAIL_PORT=${{ secrets.EMAIL_PORT }}
          EMAIL_USE_TLS=${{ secrets.EMAIL_USE_TLS }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          DEBUG=${{ secrets.DEBUG }}
          ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
          FB_APP_ID=${{ secrets.FB_APP_ID }}
          EOF

          # Pull and Up using the local .env we just created
          docker compose pull
          docker compose up -d --force-recreate