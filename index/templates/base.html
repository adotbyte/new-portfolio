{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>{% block title %}Audrius Morkūnas | Portfolio{% endblock %}</title>

    <link rel="canonical" href="{{ request.build_absolute_uri }}">

    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon-32x32.png' %}?v=3">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon-16x16.png' %}?v=3">
    <link rel="manifest" href="{% static 'images/site.webmanifest' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/apple-touch-icon.png' %}?v=3">

    <meta name="theme-color" content="#0d1117"> 
    <meta name="description" content="Explore the portfolio of Audrius Morkūnas - Developer and Creator of AdotByte AI. Expert in Linux, Django, and React.">

    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ request.build_absolute_uri }}">
    <meta property="og:title" content="Audrius Morkūnas | Portfolio">
    <meta property="og:description" content="Check out my latest projects and chat with my AI assistant, AdotByte!">
    <meta property="og:image" content="{{ request.scheme }}://{{ request.get_host }}{% static 'images/logo.png' %}">
    <meta property="og:image:alt" content="Audrius Morkūnas Portfolio Logo">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Audrius Morkūnas | Portfolio">
    <meta name="twitter:description" content="Developer Portfolio & AI Assistant.">
    <meta name="twitter:image" content="{{ request.scheme }}://{{ request.get_host }}{% static 'images/logo.png' %}">

    <link rel="stylesheet" href="{% static 'assets/index.css' %}">
    {% block extra_style %}{% endblock %}
</head>
<body class="bg-[#0d1117] text-white"> 
    {% csrf_token %}
    
    <div id="root"></div>

    <script type="module" src="{% static 'assets/index.js' %}"></script>
</body>
</html>
